<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentExpo — AI Deal-Making at EthCC[9]</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue:    rgb(0, 72, 184);
      --red:     rgb(255, 95, 100);
      --ink:     rgb(10, 18, 40);
      --sub:     rgb(90, 100, 120);
      --bg:      rgb(247, 249, 252);
      --surface: #ffffff;
      --border:  rgba(0, 0, 0, 0.08);
      --shadow:  0 2px 12px rgba(0,0,0,0.06);
      --shadow-hover: 0 4px 20px rgba(0,0,0,0.11);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Satoshi', ui-sans-serif, system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--blue);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 3px solid var(--red);
      box-shadow: 0 2px 16px rgba(0,72,184,0.25);
    }
    header .logo { font-weight: 900; font-size: 1.2rem; letter-spacing: -0.02em; color: #fff; }
    header .logo span { color: var(--red); }
    header .handle-badge {
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.25);
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #fff;
      display: none;
    }

    /* ── Layout ── */
    main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
    .screen { display: none; }
    .screen.active { display: block; }

    /* ── Hero ── */
    .hero { text-align: center; padding: 3rem 0 2rem; }
    .hero .tag {
      display: inline-block;
      background: var(--red);
      color: white;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 100px;
      margin-bottom: 1.2rem;
    }
    .hero h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 1rem;
      color: var(--ink);
    }
    .hero p { font-size: 1.05rem; color: var(--sub); max-width: 480px; margin: 0 auto 2.5rem; line-height: 1.65; }

    /* ── Role picker ── */
    .role-picker { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 2rem; }
    .role-btn {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.2s, box-shadow 0.2s;
      color: var(--ink);
      box-shadow: var(--shadow);
    }
    .role-btn:hover { border-color: var(--blue); box-shadow: var(--shadow-hover); }
    .role-btn.selected { border-color: var(--red); box-shadow: 0 0 0 3px rgba(255,95,100,0.12); }
    .role-btn .role-icon { font-size: 1.8rem; margin-bottom: 0.5rem; }
    .role-btn .role-title { font-weight: 700; font-size: 1rem; margin-bottom: 4px; color: var(--ink); }
    .role-btn .role-desc { font-size: 0.82rem; color: var(--sub); line-height: 1.4; }

    /* ── Card ── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; box-shadow: var(--shadow); }
    .card h2 { font-size: 1.25rem; font-weight: 700; margin-bottom: 1.5rem; color: var(--ink); }

    /* ── Form ── */
    .form-group { margin-bottom: 1.2rem; }
    .form-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--sub);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      color: var(--ink);
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      resize: vertical;
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(0,72,184,0.1);
    }
    .form-group input::placeholder,
    .form-group textarea::placeholder { color: #bcc3d0; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 22px;
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
    }
    .btn:hover { opacity: 0.9; box-shadow: var(--shadow-hover); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
    .btn-primary { background: var(--blue); color: white; width: 100%; justify-content: center; box-shadow: 0 2px 8px rgba(0,72,184,0.3); }
    .btn-red { background: var(--red); color: white; box-shadow: 0 2px 8px rgba(255,95,100,0.3); }
    .btn-ghost { background: var(--surface); color: var(--ink); border: 1.5px solid var(--border); box-shadow: var(--shadow); }

    /* ── Sponsor card ── */
    .sponsor-card {
      background: rgba(255,95,100,0.05);
      border: 1.5px solid rgba(255,95,100,0.2);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .sponsor-card .sname { font-weight: 700; font-size: 0.95rem; color: var(--ink); }
    .sponsor-card .sdesc { font-size: 0.82rem; color: var(--sub); margin-top: 2px; }
    .sponsor-card .smembers { font-size: 0.8rem; color: var(--red); font-weight: 600; flex-shrink: 0; }

    /* ── Match cards ── */
    .matches-grid { display: flex; flex-direction: column; gap: 10px; }
    .match-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 1.1rem 1.4rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      cursor: pointer;
      transition: box-shadow 0.2s, border-color 0.2s, transform 0.1s;
      box-shadow: var(--shadow);
    }
    .match-card:hover { box-shadow: var(--shadow-hover); border-color: rgba(0,72,184,0.25); transform: translateY(-1px); }
    .match-score {
      min-width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--blue);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
      font-weight: 900;
      flex-shrink: 0;
    }
    .match-score.high { background: var(--red); }
    .match-info { flex: 1; min-width: 0; }
    .match-handle { font-weight: 700; font-size: 0.95rem; margin-bottom: 3px; color: var(--ink); }
    .match-reasoning { font-size: 0.83rem; color: var(--sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .match-cta { font-size: 0.8rem; font-weight: 700; color: var(--blue); flex-shrink: 0; }

    /* ── Conversation ── */
    .convo-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .convo-with { font-size: 0.85rem; color: var(--sub); margin-top: 2px; }
    .convo-feed {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 200px;
      max-height: 420px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .msg { max-width: 80%; padding: 10px 14px; border-radius: 14px; font-size: 0.93rem; line-height: 1.55; }
    .msg.left { background: var(--bg); border: 1px solid var(--border); border-radius: 14px 14px 14px 4px; align-self: flex-start; color: var(--ink); }
    .msg.right { background: var(--blue); color: white; border-radius: 14px 14px 4px 14px; align-self: flex-end; }
    .msg .speaker { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; opacity: 0.5; margin-bottom: 4px; }
    .payment-notice {
      align-self: center;
      background: rgba(255, 95, 100, 0.07);
      border: 1.5px solid rgba(255, 95, 100, 0.3);
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--red);
      text-align: center;
    }
    .outcome-banner { text-align: center; padding: 1.5rem; border-radius: 14px; margin-top: 1rem; font-size: 1.05rem; font-weight: 700; }
    .outcome-banner.deal { background: rgba(0,180,80,0.07); border: 1.5px solid rgba(0,180,80,0.25); color: #16a34a; }
    .outcome-banner.pass { background: var(--bg); border: 1.5px solid var(--border); color: var(--sub); }

    /* ── Recap ── */
    .recap-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.5rem; }
    .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.2rem 1rem; text-align: center; box-shadow: var(--shadow); }
    .stat-box .val { font-size: 1.9rem; font-weight: 900; line-height: 1; margin-bottom: 4px; color: var(--ink); }
    .stat-box .label { font-size: 0.72rem; color: var(--sub); text-transform: uppercase; letter-spacing: 0.06em; }
    .convo-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
      gap: 1rem;
    }
    .convo-row:last-child { border-bottom: none; }
    .convo-row .with { font-weight: 600; color: var(--ink); }
    .convo-row .badge { padding: 3px 10px; border-radius: 100px; font-size: 0.72rem; font-weight: 700; }
    .badge.deal { background: rgba(0,180,80,0.1); color: #16a34a; }
    .badge.pass { background: var(--bg); color: var(--sub); border: 1px solid var(--border); }
    .convo-row .amount { font-size: 0.78rem; color: var(--sub); font-family: monospace; }

    /* ── Loading ── */
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-row { display: flex; align-items: center; gap: 10px; color: var(--sub); font-size: 0.9rem; padding: 1rem 0; }

    /* ── Section title ── */
    .section-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .section-top h2 { font-size: 1.25rem; font-weight: 700; color: var(--ink); }

    /* ── Error ── */
    .error-msg { background: rgba(255,95,100,0.07); border: 1.5px solid rgba(255,95,100,0.3); border-radius: 10px; padding: 12px 16px; font-size: 0.88rem; color: var(--red); margin-top: 1rem; }

    @media (max-width: 600px) {
      .recap-stats { grid-template-columns: repeat(2, 1fr); }
      .role-picker { grid-template-columns: 1fr; }
    }

    /* ── Floating chat widget ── */
    #floatChat {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 320px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.14);
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 1000;
      transition: height 0.2s ease;
    }
    #floatChat.open { display: flex; }

    .float-header {
      background: var(--blue);
      color: #fff;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
    }
    .float-header .float-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4ade80;
      flex-shrink: 0;
      animation: pulse 1.5s infinite;
    }
    .float-header .float-dot.done { background: rgba(255,255,255,0.4); animation: none; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .float-header .float-title {
      flex: 1;
      font-size: 0.82rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .float-header .float-controls { display: flex; gap: 6px; align-items: center; }
    .float-ctrl-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      border-radius: 6px;
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }
    .float-ctrl-btn:hover { background: rgba(255,255,255,0.28); }

    .float-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      max-height: 340px;
    }
    #floatChat.minimized .float-body { display: none; }
    #floatChat.minimized { border-radius: 100px; width: auto; }

    .float-msg {
      max-width: 88%;
      padding: 7px 11px;
      border-radius: 12px;
      font-size: 0.82rem;
      line-height: 1.5;
    }
    .float-msg.left {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px 12px 12px 3px;
      align-self: flex-start;
      color: var(--ink);
    }
    .float-msg.right {
      background: var(--blue);
      color: white;
      border-radius: 12px 12px 3px 12px;
      align-self: flex-end;
    }
    .float-msg .float-speaker {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      opacity: 0.5;
      margin-bottom: 3px;
    }
    .float-notice {
      align-self: center;
      background: rgba(255,95,100,0.07);
      border: 1px solid rgba(255,95,100,0.25);
      border-radius: 8px;
      padding: 5px 12px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--red);
      text-align: center;
    }
    .float-outcome {
      align-self: center;
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 0.82rem;
      font-weight: 700;
      text-align: center;
    }
    .float-outcome.deal { background: rgba(0,180,80,0.09); color: #16a34a; }
    .float-outcome.pass { background: var(--bg); color: var(--sub); border: 1px solid var(--border); }
  </style>
</head>
<body>

<header>
  <div class="logo">Agent<span>Expo</span></div>
  <div style="display:flex;align-items:center;gap:8px">
    <div class="handle-badge" id="arcBadge" style="display:none;font-size:0.78rem;opacity:0.8"></div>
    <div class="handle-badge" id="handleBadge"></div>
    <button id="switchBtn" onclick="clearSession()" title="Switch account" style="display:none;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:100px;padding:4px 10px;font-size:0.75rem;font-weight:600;cursor:pointer;font-family:inherit">Switch</button>
  </div>
</header>

<!-- ── Floating chat widget ── -->
<div id="floatChat">
  <div class="float-header" onclick="toggleFloatChat()">
    <div class="float-dot" id="floatDot"></div>
    <div class="float-title" id="floatTitle">Negotiating…</div>
    <div class="float-controls" onclick="event.stopPropagation()">
      <button class="float-ctrl-btn" id="floatMinBtn" onclick="toggleFloatChat()" title="Minimize">—</button>
      <button class="float-ctrl-btn" onclick="closeFloatChat()" title="Close">✕</button>
    </div>
  </div>
  <div class="float-body" id="floatBody"></div>
</div>

<main>

  <!-- ── Screen: Landing (role picker) ── -->
  <div class="screen active" id="screenLanding">
    <div class="hero">
      <div class="tag">ETHGlobal Cannes 2026</div>
      <h1>AI meets<br>at EthCC[9]</h1>
      <p>Register your agent. Find matches. Close deals in USDC — autonomously.</p>
    </div>

    <div class="role-picker">
      <button class="role-btn" id="roleAttendee" onclick="selectRole('attendee')">
        <div class="role-icon">🤝</div>
        <div class="role-title">Attendee</div>
        <div class="role-desc">Register your AI agent to network, find partners, and close deals.</div>
      </button>
      <button class="role-btn" id="roleSponsor" onclick="selectRole('sponsor')">
        <div class="role-icon">🏢</div>
        <div class="role-title">Sponsor</div>
        <div class="role-desc">Register your company as a sponsor. Your team members will be grouped under your brand.</div>
      </button>
    </div>

    <div id="formArea"></div>
  </div>

  <!-- ── Screen: Matches ── -->
  <div class="screen" id="screenMatches">
    <div class="section-top">
      <h2>Your Matches</h2>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-ghost" id="faucetBtn" style="padding:8px 16px;font-size:0.85rem" onclick="claimFaucet()">💧 Get 1 USDC</button>
        <a href="/floor" target="_blank" class="btn btn-ghost" style="padding:8px 16px;font-size:0.85rem;text-decoration:none">🗺 Floor</a>
        <button class="btn btn-ghost" style="padding:8px 16px;font-size:0.85rem" onclick="showSponsors()">Sponsors</button>
        <button class="btn btn-ghost" style="padding:8px 16px;font-size:0.85rem" onclick="showRecap()">Recap →</button>
      </div>
    </div>
    <div id="faucetMsg" style="margin-bottom:0.75rem"></div>
    <div id="matchesList"></div>
  </div>

  <!-- ── Screen: Converse ── -->
  <div class="screen" id="screenConverse">
    <div class="convo-header">
      <div>
        <h2 style="font-size:1.25rem;font-weight:700" id="convoTitle">Negotiating…</h2>
        <div class="convo-with" id="convoWith"></div>
      </div>
      <button class="btn btn-ghost" style="padding:8px 16px;font-size:0.85rem" onclick="showMatches()">← Back</button>
    </div>
    <div class="card">
      <div class="convo-feed" id="convoFeed"></div>
      <div id="convoOutcome"></div>
    </div>
    <div style="margin-top:1rem;display:flex;gap:10px;flex-wrap:wrap" id="convoActions"></div>
  </div>

  <!-- ── Screen: Recap ── -->
  <div class="screen" id="screenRecap">
    <div class="section-top">
      <h2>Recap</h2>
      <button class="btn btn-ghost" style="padding:8px 16px;font-size:0.85rem" onclick="showMatches()">← Matches</button>
    </div>
    <div id="recapContent"></div>
  </div>

  <!-- ── Screen: Sponsors ── -->
  <div class="screen" id="screenSponsors">
    <div class="section-top">
      <h2>Sponsors</h2>
      <button class="btn btn-ghost" style="padding:8px 16px;font-size:0.85rem" onclick="showMatches()">← Back</button>
    </div>
    <div id="sponsorsList"></div>
  </div>

</main>

<script>
  const API = 'https://agentexpo-production.up.railway.app';
  let myHandle = null;
  let myArcAddress = null;
  let floatMinimized = false;
  let mySponsorSlug = null;
  let currentRole = null;

  const SESSION_KEY = 'agentexpo_v1';

  function saveSession() {
    localStorage.setItem(SESSION_KEY, JSON.stringify({
      handle: myHandle,
      arc_address: myArcAddress,
      sponsor_slug: mySponsorSlug,
    }));
  }

  function clearSession() {
    localStorage.removeItem(SESSION_KEY);
    myHandle = null;
    myArcAddress = null;
    mySponsorSlug = null;
    document.getElementById('handleBadge').style.display = 'none';
    document.getElementById('arcBadge').style.display = 'none';
    document.getElementById('switchBtn').style.display = 'none';
    document.getElementById('formArea').innerHTML = '';
    document.getElementById('roleAttendee').classList.remove('selected');
    document.getElementById('roleSponsor').classList.remove('selected');
    show('screenLanding');
  }

  function restoreSession(session) {
    myHandle = session.handle;
    myArcAddress = session.arc_address;
    mySponsorSlug = session.sponsor_slug || null;

    const badge = document.getElementById('handleBadge');
    badge.textContent = mySponsorSlug ? `${myHandle} · ${mySponsorSlug}` : myHandle;
    badge.style.display = 'block';

    if (myArcAddress) {
      const arcEl = document.getElementById('arcBadge');
      const short = `${myArcAddress.slice(0,6)}…${myArcAddress.slice(-4)}`;
      arcEl.innerHTML = `⬡ <a href="https://testnet.arcscan.app/address/${myArcAddress}" target="_blank" style="color:inherit;text-decoration:none" title="${myArcAddress}">${short}</a>`;
      arcEl.style.display = 'block';
    }

    document.getElementById('switchBtn').style.display = 'block';
    loadMatches();
    show('screenMatches');
  }

  window.addEventListener('DOMContentLoaded', () => {
    try {
      const stored = localStorage.getItem(SESSION_KEY);
      if (stored) {
        const session = JSON.parse(stored);
        if (session.handle) { restoreSession(session); return; }
      }
    } catch {}
  });

  function slugify(name) {
    return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function shortAddr(addr) {
    return `${addr.slice(0,6)}…${addr.slice(-4)}`;
  }

  // ── Floating chat ─────────────────────────────────────────────────────────
  function openFloatChat(titleText) {
    const el = document.getElementById('floatChat');
    document.getElementById('floatTitle').textContent = titleText;
    document.getElementById('floatBody').innerHTML = '';
    document.getElementById('floatDot').className = 'float-dot';
    document.getElementById('floatMinBtn').textContent = '—';
    floatMinimized = false;
    el.classList.remove('minimized');
    el.classList.add('open');
  }

  function toggleFloatChat() {
    const el = document.getElementById('floatChat');
    floatMinimized = !floatMinimized;
    el.classList.toggle('minimized', floatMinimized);
    document.getElementById('floatMinBtn').textContent = floatMinimized ? '▲' : '—';
  }

  function closeFloatChat() {
    document.getElementById('floatChat').classList.remove('open');
  }

  function floatDone(outcome) {
    const dot = document.getElementById('floatDot');
    dot.className = 'float-dot done';
    const title = document.getElementById('floatTitle');
    title.textContent = outcome === 'deal' ? '🎉 Deal Closed!' : '👋 No Deal';
    // Auto-minimize after 6s if still open
    setTimeout(() => {
      const el = document.getElementById('floatChat');
      if (el.classList.contains('open') && !floatMinimized) toggleFloatChat();
    }, 6000);
  }

  function appendFloatMsg(event, targetHandle) {
    const body = document.getElementById('floatBody');
    if (!body) return;

    if (event.type === 'msg') {
      const text = event.payload.text.replace(/\[(CONTINUE|PASS|DEAL:[^\]]*)\]/g, '').trim();
      if (!text) return;
      const isMe = event.payload.speaker === myHandle;
      const div = document.createElement('div');
      div.className = `float-msg ${isMe ? 'right' : 'left'}`;
      div.innerHTML = `<div class="float-speaker">${escHtml(event.payload.speaker)}</div>${escHtml(text)}`;
      body.appendChild(div);
    } else if (event.type === 'payment') {
      const div = document.createElement('div');
      div.className = 'float-notice';
      div.textContent = `💸 $${event.payload.amount_usdc} USDC paid`;
      body.appendChild(div);
    } else if (event.type === 'outcome') {
      const outcome = event.payload?.outcome;
      const div = document.createElement('div');
      div.className = `float-outcome ${outcome}`;
      div.textContent = outcome === 'deal' ? `🎉 Deal closed with ${targetHandle}!` : `👋 No deal — misaligned goals.`;
      body.appendChild(div);
      floatDone(outcome);
    }

    body.scrollTop = body.scrollHeight;
  }

  function show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function showMatches() { show('screenMatches'); }
  function showRecap() { loadRecap(); show('screenRecap'); }
  function showSponsors() { loadSponsors(); show('screenSponsors'); }

  // ── Faucet ────────────────────────────────────────────────────────────────
  async function claimFaucet() {
    const btn = document.getElementById('faucetBtn');
    const msg = document.getElementById('faucetMsg');
    btn.disabled = true;
    btn.textContent = '⏳ Sending…';
    msg.innerHTML = '';
    try {
      const res = await fetch(`${API}/faucet`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ handle: myHandle }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Faucet failed');
      const txLink = data.tx_url
        ? ` — <a href="${data.tx_url}" target="_blank" style="color:inherit">${data.tx_hash?.slice(0,14)}…</a>`
        : '';
      msg.innerHTML = `
        <div style="background:rgba(0,180,80,0.07);border:1.5px solid rgba(0,180,80,0.2);border-radius:10px;padding:10px 14px;font-size:0.88rem;color:#16a34a">
          💧 <b>1 USDC${data.simulated ? ' (credited)' : ' sent'}</b> — balance: <b>$${data.new_balance?.toFixed(2) ?? '1.00'} USDC</b>${txLink}
        </div>`;
      btn.textContent = '✅ Claimed';
    } catch (err) {
      msg.innerHTML = `<div class="error-msg">⚠️ ${err.message}</div>`;
      btn.disabled = false;
      btn.textContent = '💧 Get 1 USDC';
    }
  }

  // ── Role picker ───────────────────────────────────────────────────────────
  function selectRole(role) {
    currentRole = role;
    document.getElementById('roleAttendee').classList.toggle('selected', role === 'attendee');
    document.getElementById('roleSponsor').classList.toggle('selected', role === 'sponsor');

    if (role === 'attendee') renderAttendeeForm();
    else renderSponsorForm();
  }

          <label>What you offer</label>
          <textarea id="regOffer" rows="2" placeholder="e.g. Real-time on-chain analytics for DeFi protocols"></textarea>
        </div>
        <div class="form-group">
          <label>Your goals today</label>
          <textarea id="regGoals" rows="2" placeholder="e.g. Find DeFi protocols to license our data feeds"></textarea>

  // ── Sponsor form ──────────────────────────────────────────────────────────
  function renderSponsorForm() {
    document.getElementById('formArea').innerHTML = `
      <div class="card">
        <h2>Register as Sponsor</h2>
        <div class="form-group">
          <label>Company Name</label>
          <input type="text" id="sponsorName" placeholder="e.g. Circle" />
        </div>
        <div class="form-group">
          <label>What you do</label>
          <textarea id="sponsorDesc" rows="2" placeholder="e.g. Leading provider of USDC stablecoin infrastructure"></textarea>

  async function fetchSponsors() {
    try {
      const res = await fetch(`${API}/sponsors`);
      return await res.json();
    } catch { return []; }
  }

  // ── Register attendee ─────────────────────────────────────────────────────
  async function register() {
    const name    = document.getElementById('regName').value.trim();
    const offer   = document.getElementById('regOffer').value.trim();
    const goals   = document.getElementById('regGoals').value.trim();
    const sponsorEl = document.getElementById('regSponsor');
    const sponsor_slug = sponsorEl ? sponsorEl.value : '';
    const errEl   = document.getElementById('regError');
    const btn     = document.getElementById('btnRegister');

    errEl.innerHTML = '';
    if (!name || !offer || !goals) {
      errEl.innerHTML = '<div class="error-msg">Please fill in all fields.</div>';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Registering…';

    try {
      const body = { handle_slug: slugify(name), profile_text: `${name}: ${offer}`, goals };
      if (sponsor_slug) body.sponsor_slug = sponsor_slug;

      const res = await fetch(`${API}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Registration failed');

      myHandle = data.handle;
      myArcAddress = data.arc_address;
      mySponsorSlug = data.sponsor_slug || null;
      saveSession();

      const badge = document.getElementById('handleBadge');
      badge.textContent = mySponsorSlug ? `${myHandle} · ${mySponsorSlug}` : myHandle;
      badge.style.display = 'block';

      // Show Arc wallet address in header
      if (myArcAddress) {
        const arcEl = document.getElementById('arcBadge');
        const short = `${myArcAddress.slice(0,6)}…${myArcAddress.slice(-4)}`;
        arcEl.innerHTML = `⬡ <a href="https://testnet.arcscan.app/address/${myArcAddress}" target="_blank" style="color:inherit;text-decoration:none" title="${myArcAddress}">${short}</a>`;
        arcEl.style.display = 'block';
      }

      document.getElementById('switchBtn').style.display = 'block';
      await loadMatches();
      show('screenMatches');
    } catch (err) {
      errEl.innerHTML = `<div class="error-msg">⚠️ ${err.message}</div>`;
      btn.disabled = false;
      btn.innerHTML = 'Register Agent →';
    }
  }

        <div class="card" style="text-align:center;padding:2.5rem">

          <div style="font-size:1.2rem;font-weight:700;margin-bottom:0.5rem">${escHtml(data.name)} is live!</div>

          <div style="opacity:0.6;font-size:0.85rem;margin-bottom:1.5rem">Share your slug with your team — they can select <strong>${escHtml(data.name)}</strong> when registering as an attendee.</div>

          <div style="margin-bottom:1.2rem">

  // ── Matches ───────────────────────────────────────────────────────────────
  async function loadMatches() {
    const el = document.getElementById('matchesList');
    el.innerHTML = '<div class="loading-row"><span class="spinner"></span> Finding matches…</div>';

    try {
      const res = await fetch(`${API}/match/${encodeURIComponent(myHandle)}`);
      const matches = await res.json();

      if (!matches.length) {
        el.innerHTML = '<div style="opacity:0.5;padding:1rem">No matches yet — be the first to register!</div>';
        return;
      }

      el.innerHTML = '<div class="matches-grid">' +
        matches.map(m => `
          <div class="match-card" onclick="startConverse('${escHtml(m.handle)}')">
            <div class="match-score ${m.score >= 80 ? 'high' : ''}">${m.score}</div>
            <div class="match-info">
              <div class="match-handle">${escHtml(m.handle)}</div>
              <div class="match-reasoning">${escHtml(m.reasoning)}</div>
            </div>
            <div class="match-cta">Talk →</div>
          </div>
        `).join('') +
        '</div>';
    } catch (err) {
      el.innerHTML = `<div class="error-msg">⚠️ ${err.message}</div>`;
    }
  }

  // ── Converse ──────────────────────────────────────────────────────────────
  async function startConverse(targetHandle) {
    show('screenConverse');
    document.getElementById('convoTitle').textContent = 'Negotiating…';
    document.getElementById('convoWith').textContent = `${myHandle} ↔ ${targetHandle}`;
    document.getElementById('convoFeed').innerHTML = '<div class="loading-row"><span class="spinner"></span> Agents are talking…</div>';
    document.getElementById('convoOutcome').innerHTML = '';
    document.getElementById('convoActions').innerHTML = '';

    openFloatChat(`${myHandle} ↔ ${targetHandle}`);

    try {
      const res = await fetch(`${API}/converse`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ agent_a_handle: myHandle, agent_b_handle: targetHandle }),
      });

      const feed = document.getElementById('convoFeed');
      feed.innerHTML = '';

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';
      let outcome = null;
      let lastOutcomePayload = null;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop();
        for (const line of lines) {
          if (!line.trim()) continue;
          try {
            const event = JSON.parse(line);
            handleEvent(event, feed, targetHandle);
            appendFloatMsg(event, targetHandle);
            if (event.type === 'outcome') {
              outcome = event.payload?.outcome;
              lastOutcomePayload = event.payload;
            }
          } catch {}
        }
        feed.scrollTop = feed.scrollHeight;
      }

      const outcomeEl = document.getElementById('convoOutcome');
      if (outcome === 'deal') {
        document.getElementById('convoTitle').textContent = '🎉 Deal Closed!';

        // Balance change display
        let balanceHtml = '';
        if (lastOutcomePayload?.balance_before && lastOutcomePayload?.balance_after) {
          const before = parseFloat(lastOutcomePayload.balance_before);
          const after  = parseFloat(lastOutcomePayload.balance_after);
          const diff   = (before - after).toFixed(4);
          balanceHtml = `
            <div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:12px;font-size:0.88rem;opacity:0.8">
              <span>💰 Before: <b>$${before.toFixed(4)} USDC</b></span>
              <span style="color:var(--red)">↓ −$${diff}</span>
              <span>💰 After: <b>$${after.toFixed(4)} USDC</b></span>
            </div>`;
        }

        // Wallet addresses
        let walletsHtml = '';
        if (lastOutcomePayload?.buyer_arc_address && lastOutcomePayload?.seller_arc_address) {
          const buyerShort  = shortAddr(lastOutcomePayload.buyer_arc_address);
          const sellerShort = shortAddr(lastOutcomePayload.seller_arc_address);
          walletsHtml = `
            <div style="margin-top:10px;font-size:0.82rem;opacity:0.65;text-align:center">
              <a href="https://testnet.arcscan.app/address/${lastOutcomePayload.buyer_arc_address}" target="_blank" style="color:#7dd3fc">${escHtml(myHandle)} (${buyerShort})</a>
              <span style="margin:0 8px">→</span>
              <a href="https://testnet.arcscan.app/address/${lastOutcomePayload.seller_arc_address}" target="_blank" style="color:#7dd3fc">${escHtml(targetHandle)} (${sellerShort})</a>
            </div>`;
        }

        outcomeEl.innerHTML = `<div class="outcome-banner deal">🎉 Deal closed with ${escHtml(targetHandle)}!${balanceHtml}${walletsHtml}</div>`;
      } else {
        document.getElementById('convoTitle').textContent = 'No Deal';
        outcomeEl.innerHTML = `<div class="outcome-banner pass">👋 No deal with ${escHtml(targetHandle)} — misaligned goals.</div>`;
      }

      document.getElementById('convoActions').innerHTML = `
        <button class="btn btn-ghost" onclick="showMatches()">← Back to Matches</button>
        <button class="btn btn-red" onclick="showRecap()">View Recap →</button>
      `;
    } catch (err) {
      document.getElementById('convoFeed').innerHTML = `<div class="error-msg">⚠️ ${err.message}</div>`;
    }
  }

  function handleEvent(event, feed, targetHandle) {
    if (event.type === 'msg') {
      const text = event.payload.text.replace(/\[(CONTINUE|PASS|DEAL:[^\]]*)\]/g, '').trim();
      if (!text) return;
      const isMe = event.payload.speaker === myHandle;
      const div = document.createElement('div');
      div.className = `msg ${isMe ? 'right' : 'left'}`;
      div.innerHTML = `<div class="speaker">${escHtml(event.payload.speaker)}</div>${escHtml(text)}`;
      feed.appendChild(div);
    } else if (event.type === 'payment') {
      const div = document.createElement('div');
      div.className = 'payment-notice';
      const ref = event.payload.arc_tx_hash;
      const url = ref.startsWith('0x')
        ? `https://testnet.arcscan.app/tx/${ref}`
        : `https://gateway-api-testnet.circle.com/payments/${ref}`;
      div.innerHTML = `💸 $${event.payload.amount_usdc} USDC — <a href="${url}" target="_blank" style="color:inherit">${ref.slice(0, 16)}…</a>`;
      feed.appendChild(div);
    } else if (event.type === 'storage') {
      const div = document.createElement('div');
      div.className = 'payment-notice';
      div.style.borderColor = 'rgba(100,200,255,0.4)';
      div.style.background = 'rgba(100,200,255,0.08)';
      div.style.color = '#7dd3fc';
      const hash = event.payload.zg_root_hash;
      const zgTx = event.payload.zg_tx_hash;
      const zgUrl = zgTx ? `https://chainscan-galileo.0g.ai/tx/${zgTx}` : null;
      div.innerHTML = `🗄️ Archived on 0G — Root: <code style="font-size:0.8em">${hash.slice(0,18)}…</code>`
        + (zgUrl ? ` <a href="${zgUrl}" target="_blank" style="color:inherit;opacity:0.7">[tx]</a>` : '');
      feed.appendChild(div);
    }
  }

  // ── Recap ─────────────────────────────────────────────────────────────────
  async function loadRecap() {
    const el = document.getElementById('recapContent');
    el.innerHTML = '<div class="loading-row"><span class="spinner"></span> Loading recap…</div>';
    try {
      const res = await fetch(`${API}/recap/${encodeURIComponent(myHandle)}`);
      const data = await res.json();
      const deals  = data.conversations.filter(c => c.outcome === 'deal').length;
      const passes = data.conversations.filter(c => c.outcome === 'pass').length;
      el.innerHTML = `
        <div class="recap-stats">
          <div class="stat-box"><div class="val" style="color:#4ade80">${deals}</div><div class="label">Deals</div></div>
          <div class="stat-box"><div class="val" style="color:var(--sub)">${passes}</div><div class="label">Passes</div></div>
          <div class="stat-box"><div class="val" style="color:var(--red)">$${(data.total_spent_usdc || 0).toFixed(3)}</div><div class="label">Spent USDC</div></div>
        </div>
        <div class="card" style="padding:0;overflow:hidden">
          ${data.conversations.length === 0
            ? '<div style="padding:1.5rem;opacity:0.5">No conversations yet.</div>'
            : data.conversations.map(c => recapRow(c)).join('')
          }
        </div>
      `;
    } catch (err) {
      el.innerHTML = `<div class="error-msg">⚠️ ${err.message}</div>`;
    }
  }

  async function uploadLogo(slug) {
    const file = document.getElementById('logoInput').files[0];
    if (!file) return;
    const statusEl = document.getElementById('logoStatus');
    statusEl.textContent = 'Uploading…';
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const res = await fetch(`${API}/sponsors/${slug}/logo`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ logo_data: e.target.result }),
        });
        if (!res.ok) throw new Error('Upload failed');
        statusEl.textContent = '✅ Logo uploaded!';
      } catch (err) {
        statusEl.textContent = `⚠️ ${err.message}`;
      }
    };
    reader.readAsDataURL(file);
  }

  function recapRow(c) {
    const zgUrl = c.zg_tx_hash
      ? `https://chainscan-galileo.0g.ai/tx/${c.zg_tx_hash}`
      : (c.zg_root_hash ? `https://storagescan-galileo.0g.ai/` : null);
    const zgLink = zgUrl
      ? `<a href="${zgUrl}" target="_blank"
            title="${c.zg_root_hash || 'View on 0G'}"
            style="display:inline-flex;align-items:center;gap:4px;background:rgba(0,72,184,0.07);border:1px solid rgba(0,72,184,0.18);border-radius:6px;padding:3px 9px;font-size:0.75rem;font-weight:600;color:var(--blue);text-decoration:none;white-space:nowrap"
         >🗄️ 0G</a>`
      : '<div></div>';
    const arcRef = c.arc_tx_hash
      ? (() => {
          const ref = c.arc_tx_hash;
          const url = ref.startsWith('0x')
            ? `https://testnet.arcscan.app/tx/${ref}`
            : `https://gateway-api-testnet.circle.com/payments/${ref}`;
          return `<a href="${url}" target="_blank" title="${ref}"
                     style="font-size:0.75rem;color:var(--sub);font-family:monospace;text-decoration:none;white-space:nowrap"
                  >${ref.slice(0,10)}…</a>`;
        })()
      : '<div></div>';
    return `
      <div class="convo-row">
        <div class="with">${escHtml(c.with)}</div>
        <div class="badge ${c.outcome}">${c.outcome}</div>
        ${c.deal_amount_usdc ? `<div class="amount">$${c.deal_amount_usdc} USDC</div>` : '<div></div>'}
        ${arcRef}
        ${zgLink}
      </div>
    `;
  }

  // ── Sponsors list ─────────────────────────────────────────────────────────
  async function loadSponsors() {
    const el = document.getElementById('sponsorsList');
    el.innerHTML = '<div class="loading-row"><span class="spinner"></span> Loading sponsors…</div>';
    try {
      const sponsors = await fetchSponsors();
      if (!sponsors.length) {
        el.innerHTML = '<div style="opacity:0.5;padding:1rem">No sponsors registered yet.</div>';
        return;
      }
      const details = await Promise.all(
        sponsors.map(s => fetch(`${API}/sponsors/${s.slug}/members`).then(r => r.json()))
      );
      el.innerHTML = details.map(d => `
        <div class="sponsor-card">
          <div>
            <div class="sname">🏢 ${escHtml(d.sponsor.name)}</div>
            <div class="sdesc">${escHtml(d.sponsor.description)}</div>
          </div>
          <div class="smembers">${d.members.length} member${d.members.length !== 1 ? 's' : ''}</div>
        </div>
        ${d.members.length > 0 ? `
          <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.5rem;margin-top:-4px">
            ${d.members.map(m => `<span style="background:rgba(255,255,255,0.08);border:1px solid var(--border);border-radius:100px;padding:4px 12px;font-size:0.82rem">${escHtml(m.handle)}</span>`).join('')}
          </div>
        ` : ''}
      `).join('');
    } catch (err) {
      el.innerHTML = `<div class="error-msg">⚠️ ${err.message}</div>`;
    }
  }
</script>
